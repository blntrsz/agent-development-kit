[tasks."build:bun"]
description = "Build the project using Bun"
run = "bun build ./src/index.ts --target=bun --outfile=./bin/adk"

[tasks."build:docker"]
description = "Build the Docker image for the project"
run = "docker build --no-cache -t adk-pi ."

[tasks.build]
description = "Build the project using Bun and Docker"
run = "mise run build:bun && mise run build:docker"

[tasks.start]
description = "Start the Docker container for the project"
run = "docker run -p 3000:3000 adk-pi"
